<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F4F7FF; }
        
        /* 奖励卡片背景 */
        .reward-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* 会员专属高亮色 */
        .vip-accent {
            background: linear-gradient(135deg, #7c3aed 0%, #6366f1 100%);
        }
        
        /* 引导动效 */
        .pulse-btn {
            animation: shadow-pulse 2s infinite;
        }
        @keyframes shadow-pulse {
            0% { box-shadow: 0 0 0 0px rgba(99, 102, 241, 0.4); }
            100% { box-shadow: 0 0 0 12px rgba(99, 102, 241, 0); }
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto space-y-6">
        
        <div class="flex items-center justify-between px-2">
            <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest">邀请好礼</h3>
            <span class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-full">进行中</span>
        </div>

        <div class="reward-card rounded-[32px] p-6 shadow-xl shadow-indigo-100/30">
            <div class="flex items-start justify-between mb-6">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-tighter mb-1">Standard User</p>
                    <h4 class="text-lg font-black text-slate-800 leading-tight">邀请新人注册</h4>
                    <p class="text-xs text-slate-500 font-bold mt-1">立享免费对话特权</p>
                </div>
                <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-4 border border-slate-100 mb-6">
                <div class="flex items-center gap-3">
                    <span class="text-3xl font-black text-indigo-500">+5</span>
                    <div class="flex-1">
                        <p class="text-xs font-black text-slate-800">免费对话额度</p>
                        <p class="text-[10px] text-slate-400 font-bold italic">每成功邀请 1 位好友注册+建立档案</p>
                    </div>
                </div>
            </div>

            <button class="w-full py-4 vip-accent text-white text-xs font-black rounded-2xl shadow-lg hover:opacity-90 transition-all active:scale-95">
                立即邀请领额度
            </button>
        </div>

        <div class="vip-accent rounded-[32px] p-6 shadow-2xl shadow-indigo-200/50 relative overflow-hidden">
            <div class="absolute -right-8 -top-8 w-32 h-32 bg-white/10 rounded-full blur-3xl"></div>
            
            <div class="flex items-start justify-between mb-6 relative z-10">
                <div>
                    <span class="px-2 py-0.5 rounded-md bg-white/20 text-[9px] font-black text-white uppercase italic">VIP Exclusive</span>
                    <h4 class="text-lg font-black text-white mt-2 leading-tight">会员专属延期奖励</h4>
                    <p class="text-xs text-white/70 font-bold mt-1">您的影响力，能让智慧延续</p>
                </div>
                <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </div>
            </div>

            <div class="bg-white/10 rounded-2xl p-4 border border-white/10 mb-6 relative z-10">
                <div class="flex items-center gap-3">
                    <span class="text-3xl font-black text-white">+3<small class="text-xs ml-1">天</small></span>
                    <div class="flex-1">
                        <p class="text-xs font-black text-white">会员期限顺延</p>
                        <p class="text-[10px] text-white/50 font-bold italic">好友完成注册并建立首份档案即可</p>
                    </div>
                </div>
            </div>

            <button class="w-full py-4 bg-white text-indigo-600 text-xs font-black rounded-2xl shadow-xl hover:bg-slate-50 transition-all active:scale-95 pulse-btn relative z-10">
                邀请好友并延期
            </button>
        </div>

        <div class="flex items-center justify-between bg-white rounded-2xl p-4 border border-slate-100 shadow-sm">
            <div>
                <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest mb-1">My Referral Code</p>
                <p class="text-xl font-black text-slate-800 tracking-tighter">729586</p>
            </div>
            <button class="px-4 py-2 bg-slate-900 text-white text-[10px] font-black rounded-xl hover:bg-slate-800 transition-colors">
                复制分享
            </button>
        </div>

    </div>

</body>
</html>
