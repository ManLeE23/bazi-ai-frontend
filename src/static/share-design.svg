<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F0FA"/>
      <stop offset="50%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>

    <!-- Card Gradient (Glassmorphism) -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.75"/>
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#4F46E5" flood-opacity="0.08"/>
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Base Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>

  <!-- Ambient Glows for Mystical/Tech Feel -->
  <circle cx="200" cy="200" r="300" fill="#FFFFFF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="900" cy="900" r="400" fill="#818CF8" opacity="0.25" filter="url(#glow)"/>
  <circle cx="800" cy="200" r="250" fill="#C4B5FD" opacity="0.2" filter="url(#glow)"/>

  <!-- Center Card -->
  <rect x="100" y="140" width="880" height="800" rx="60" fill="url(#cardGrad)" filter="url(#shadow)" stroke="#FFFFFF" stroke-width="4"/>

  <!-- Icon / Logo Area -->
  <g transform="translate(540, 280)">
    <circle cx="0" cy="0" r="48" fill="#1E293B"/>
    <!-- Abstract spark/star icon -->
    <path d="M0 -24 C4 -8 8 -4 24 0 C8 4 4 8 0 24 C-4 8 -8 4 -24 0 C-8 -4 -4 -8 0 -24 Z" fill="#FFFFFF"/>
  </g>

  <!-- Main Typography -->
  <text x="540" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="#1E293B" text-anchor="middle" letter-spacing="6">开启自我探索之旅</text>
  <text x="540" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="500" fill="#64748B" text-anchor="middle" letter-spacing="2">AI 驱动 · 多维解析你的潜能与方向</text>

  <!-- Feature Tags -->
  <g transform="translate(190, 600)">
    <!-- Row 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="200" height="80" rx="40" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="2"/>
      <text x="100" y="50" font-family="system-ui, sans-serif" font-size="32" font-weight="600" fill="#4F46E5" text-anchor="middle">知势</text>
    </g>
    <g transform="translate(250, 0)">
      <rect x="0" y="0" width="200" height="80" rx="40" fill="#FFF1F2" stroke="#FECDD3" stroke-width="2"/>
      <text x="100" y="50" font-family="system-ui, sans-serif" font-size="32" font-weight="600" fill="#E11D48" text-anchor="middle">知心</text>
    </g>
    <g transform="translate(500, 0)">
      <rect x="0" y="0" width="200" height="80" rx="40" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
      <text x="100" y="50" font-family="system-ui, sans-serif" font-size="32" font-weight="600" fill="#D97706" text-anchor="middle">知业</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(125, 120)">
      <rect x="0" y="0" width="200" height="80" rx="40" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="2"/>
      <text x="100" y="50" font-family="system-ui, sans-serif" font-size="32" font-weight="600" fill="#16A34A" text-anchor="middle">MBTI</text>
    </g>
    <g transform="translate(375, 120)">
      <rect x="0" y="0" width="200" height="80" rx="40" fill="#FAF5FF" stroke="#E9D5FF" stroke-width="2"/>
      <text x="100" y="50" font-family="system-ui, sans-serif" font-size="32" font-weight="600" fill="#9333EA" text-anchor="middle">看生辰</text>
    </g>
  </g>

  <!-- Footer / Branding -->
  <g transform="translate(540, 850)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#94A3B8" text-anchor="middle" letter-spacing="4">BAZI AI 顾问</text>
  </g>
</svg>