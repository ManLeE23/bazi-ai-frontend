<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 2026 报告生成中</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #F8FAFC;
        }

        /* 大脑呼吸动画 */
        @keyframes pulse-brain {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .animate-brain {
            animation: pulse-brain 2s infinite ease-in-out;
        }

        /* 项目条加载动画 */
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .step-item {
            animation: fade-in-up 0.5s ease forwards;
        }

        /* 进度条流动效果 */
        .progress-flow {
            background: linear-gradient(90deg, #4F46E5, #818CF8, #4F46E5);
            background-size: 200% 100%;
            animation: flow 2s linear infinite;
        }
        @keyframes flow {
            0% { background-position: 200% 0; }
            100% { background-position: 0 0; }
        }

        .modal-blur {
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- 模拟背景（报告预览图，被模糊处理） -->
    <div class="fixed inset-0 grayscale opacity-20 pointer-events-none flex">
        <div class="w-64 border-r p-8 space-y-4">
            <div class="h-8 w-32 bg-gray-300 rounded"></div>
            <div class="h-10 w-full bg-gray-200 rounded"></div>
            <div class="h-10 w-full bg-gray-200 rounded"></div>
        </div>
        <div class="flex-1 p-12">
            <div class="h-20 w-1/2 bg-gray-300 rounded mb-8"></div>
            <div class="h-64 w-full bg-gray-100 rounded-3xl"></div>
        </div>
    </div>

    <!-- 核心加载弹窗 -->
    <div id="loading-modal" class="relative z-50 w-full max-w-md bg-white rounded-[40px] shadow-2xl border border-white p-8 md:p-10 transition-all duration-500 transform scale-100">
        
        <!-- 顶部标题 -->
        <div class="text-center mb-8">
            <h2 class="text-2xl font-black text-indigo-600 mb-2">MBTI 深度分析</h2>
            <p class="text-sm text-gray-400 font-medium">基于您的答题结果，我们正在进行多维度算法拟合...</p>
        </div>

        <!-- 动态大脑图标 -->
        <div class="flex justify-center mb-10">
            <div class="relative">
                <div class="absolute inset-0 bg-indigo-100 rounded-full blur-3xl opacity-50 animate-pulse"></div>
                <svg class="w-24 h-24 text-indigo-500 animate-brain relative z-10" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.416.599.111.82-.259.82-.577 0-.285-.011-1.04-.017-2.043-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .322.218.694.825.576C19.137 20.164 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                    <!-- 这里可以使用更像大脑的路径，演示目的使用占位图标 -->
                </svg>
            </div>
        </div>

        <!-- 进度条 -->
        <div class="mb-10 text-center">
            <div class="flex justify-between items-center mb-2 px-1">
                <span class="text-xs font-black text-gray-500 uppercase tracking-widest">Analysis Progress</span>
                <span id="progress-text" class="text-sm font-black text-indigo-600">0%</span>
            </div>
            <div class="w-full h-3 bg-gray-100 rounded-full overflow-hidden p-0.5 border border-gray-50">
                <div id="progress-bar" class="h-full rounded-full progress-flow" style="width: 0%"></div>
            </div>
        </div>

        <!-- 分析步骤项目 (参考图中的列表样式) -->
        <div class="space-y-3" id="steps-container">
            <!-- 初始加载一项 -->
            <div class="step-item flex items-center gap-4 p-4 rounded-2xl bg-indigo-50 border border-indigo-100">
                <div class="w-8 h-8 rounded-lg bg-indigo-500 flex items-center justify-center text-white">
                    <svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle>
                        <path d="M12 2a10 10 0 0 1 10 10"></path>
                    </svg>
                </div>
                <span class="text-sm font-bold text-indigo-900">正在检索基础人格特征...</span>
            </div>
        </div>

        <!-- 底部文案 -->
        <div class="mt-8 text-center">
            <p class="text-[10px] text-gray-300 font-bold uppercase tracking-[0.2em]">Data processing by MBTI Engine v2.6</p>
        </div>
    </div>

    <!-- 结果准备就绪按钮（初始隐藏） -->
    <button id="finish-btn" class="hidden fixed bottom-10 z-[60] bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-indigo-200 transform transition-all hover:scale-105 active:scale-95">
        查看分析报告
    </button>

    <script>
        const steps = [
            "正在分析性格内外向、直觉、情感...",
            "正在构建您的天赋与行为风格模型...",
            "正在综合分析您的核心优势与劣势...",
            "正在匹配最适合的职业发展路径...",
            "正在计算情感模式与亲密关系需求...",
            "正在生成进阶提升个性化建议...",
            "数据拟合完成，报告渲染中..."
        ];

        let currentStep = 0;
        let progress = 0;
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const stepsContainer = document.getElementById('steps-container');
        const modal = document.getElementById('loading-modal');
        const finishBtn = document.getElementById('finish-btn');

        function updateLoading() {
            if (progress >= 100) {
                progress = 100;
                progressText.innerText = "100%";
                progressBar.style.width = "100%";
                
                // 完成状态
                setTimeout(() => {
                    modal.classList.add('opacity-0', 'scale-95');
                    finishBtn.classList.remove('hidden');
                    finishBtn.classList.add('animate-bounce');
                }, 500);
                return;
            }

            // 增加进度
            progress += Math.floor(Math.random() * 5) + 1;
            if (progress > 100) progress = 100;
            
            progressText.innerText = progress + "%";
            progressBar.style.width = progress + "%";

            // 每隔 15% 左右更新一次文字项
            if (progress > (currentStep + 1) * 14 && currentStep < steps.length - 1) {
                currentStep++;
                addStepUI(steps[currentStep]);
            }

            setTimeout(updateLoading, 200 + Math.random() * 300);
        }

        function addStepUI(text) {
            // 将之前的项标记为完成
            const prevItems = stepsContainer.querySelectorAll('.step-item');
            if (prevItems.length > 0) {
                const last = prevItems[prevItems.length - 1];
                last.classList.remove('bg-indigo-50', 'border-indigo-100');
                last.classList.add('bg-gray-50', 'border-gray-100', 'opacity-60');
                last.querySelector('.w-8').innerHTML = '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>';
                last.querySelector('.w-8').classList.remove('bg-indigo-500');
                last.querySelector('.w-8').classList.add('bg-green-400');
                last.querySelector('span').classList.replace('text-indigo-900', 'text-gray-400');
            }

            // 添加新项
            const div = document.createElement('div');
            div.className = "step-item flex items-center gap-4 p-4 rounded-2xl bg-indigo-50 border border-indigo-100";
            div.innerHTML = `
                <div class="w-8 h-8 rounded-lg bg-indigo-500 flex items-center justify-center text-white">
                    <svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle>
                        <path d="M12 2a10 10 0 0 1 10 10"></path>
                    </svg>
                </div>
                <span class="text-sm font-bold text-indigo-900">${text}</span>
            `;
            stepsContainer.appendChild(div);

            // 保持最新项可见 (如果容器有滚动)
            if (stepsContainer.children.length > 3) {
                stepsContainer.children[0].remove(); // 只保留最近的3条
            }
        }

        // 启动
        window.onload = () => {
            setTimeout(updateLoading, 1000);
        };

        // 模拟点击进入正式报告
        finishBtn.onclick = () => {
            document.body.innerHTML = '<div class="flex items-center justify-center h-screen font-black text-2xl text-indigo-600">正在进入正式报告界面...</div>';
            // 这里通常会跳转到之前设计的侧边栏报告页面
            setTimeout(() => {
                window.location.href = 'mbti_pro_report.html'; 
            }, 800);
        };
    </script>
</body>
</html>
