<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; }
        .premium-bg {
            background: linear-gradient(135deg, #7c3aed 0%, #6366f1 100%);
        }
        .invite-card-gradient {
            background: linear-gradient(180deg, #FFFFFF 0%, #F4F7FF 100%);
        }
    </style>
</head>
<body class="min-h-screen flex justify-center items-start pt-6 px-4">

    <div class="w-full max-w-md bg-white rounded-[40px] shadow-2xl p-6 border border-slate-50 flex flex-col">
        
        <div class="flex items-center justify-between mb-6 px-1">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-500 font-bold text-lg border-2 border-white shadow-sm">趋</div>
                <div>
                    <h2 class="text-base font-black text-slate-800 tracking-tight">趋势528677</h2>
                    <span class="px-2 py-0.5 rounded-md bg-indigo-50 text-[9px] font-black text-indigo-400 uppercase tracking-widest">普通用户</span>
                </div>
            </div>
            <button class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <div class="premium-bg rounded-[32px] p-6 mb-6 text-white relative overflow-hidden shadow-lg shadow-indigo-100">
            <div class="flex justify-between items-center relative z-10">
                <div>
                    <span class="px-2 py-0.5 rounded-md bg-white/20 text-[9px] font-black uppercase italic">限时特惠</span>
                    <h3 class="text-lg font-black mt-1">人生趋势高级会员</h3>
                    <p class="text-[10px] opacity-70 font-bold mt-1">激活解锁 100% 深度诊断权益</p>
                </div>
                <button class="bg-white px-5 py-2 rounded-2xl text-[11px] font-black text-indigo-600 shadow-xl">激活</button>
            </div>
        </div>

        <div class="invite-card-gradient rounded-[32px] p-5 border border-indigo-50 mb-6">
            <div class="flex items-center justify-between mb-4">
                <h4 class="text-[11px] font-black text-slate-400 uppercase tracking-widest">邀请有礼</h4>
                <button class="text-[10px] font-bold text-indigo-500 flex items-center gap-1">
                    邀请记录
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm">
                    <p class="text-indigo-600 font-black text-lg">+5<small class="text-[10px] ml-0.5">次</small></p>
                    <p class="text-[9px] text-slate-400 font-bold leading-tight">普通用户对话额度</p>
                </div>
                <div class="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm">
                    <p class="text-indigo-600 font-black text-lg">+3<small class="text-[10px] ml-0.5">天</small></p>
                    <p class="text-[9px] text-slate-400 font-bold leading-tight">高级会员效期顺延</p>
                </div>
            </div>

            <div class="flex items-center gap-1.5 px-1 mb-5">
                <div class="w-1 h-1 rounded-full bg-indigo-400"></div>
                <p class="text-[10px] font-bold text-indigo-400 italic">备注：需新用户注册并建立档案，奖励才生效</p>
            </div>

            <div class="bg-white rounded-2xl p-4 border border-indigo-100/30 flex items-center justify-between mb-4 shadow-sm">
                <div>
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1">我的邀请码</p>
                    <div class="flex items-center gap-2">
                        <span class="text-xl font-black text-slate-800 tracking-tighter">729586</span>
                        <button class="px-2 py-0.5 rounded bg-indigo-50 text-indigo-500 text-[8px] font-black hover:bg-indigo-100">复制</button>
                    </div>
                </div>
                <button class="px-5 py-2.5 bg-slate-900 text-white text-[11px] font-black rounded-xl shadow-lg active:scale-95 transition-all">
                    填写邀请码
                </button>
            </div>

            <button class="w-full py-4 bg-indigo-500 text-white text-xs font-black rounded-2xl shadow-xl shadow-indigo-100 active:scale-[0.98] transition-all">
                立即邀请领奖励
            </button>
          </div>
    </div>

</body>
</html>
