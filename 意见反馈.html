<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 页面底色参考应用背景 */
        body { background-color: #F1F0FA; font-family: -apple-system, sans-serif; }
        .input-focus:focus { outline: none; background-color: white; border-color: #818CF8; }
        /* 品牌渐变色参考旺衰进度条 */
        .brand-gradient { background: linear-gradient(90deg, #818CF8 0%, #6366F1 100%); }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen pb-12">

    <header class="w-full max-w-md flex items-center justify-center py-4 mb-4">
        <h1 class="text-base font-black text-slate-800 tracking-tight">用户反馈</h1>
    </header>

    <main class="w-full max-w-md space-y-4">
        
        <section class="bg-white rounded-[32px] p-6 shadow-sm">
            <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-4">反馈类型 *</h3>
            <div class="flex flex-wrap gap-2">
                <button class="px-5 py-2 bg-indigo-600 text-white rounded-full text-[11px] font-black shadow-md shadow-indigo-100 transition-all">
                    问题反馈
                </button>
                <button class="px-5 py-2 bg-slate-50 text-slate-400 rounded-full text-[11px] font-black border border-slate-100 hover:bg-slate-100 transition-all">
                    功能建议
                </button>
                <button class="px-5 py-2 bg-slate-50 text-slate-400 rounded-full text-[11px] font-black border border-slate-100 hover:bg-slate-100 transition-all">
                    数据纠错
                </button>
            </div>
        </section>

        <section class="bg-white rounded-[32px] p-6 shadow-sm">
            <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-4">反馈内容 *</h3>
            <textarea 
                placeholder="请详细描述您的反馈..." 
                class="w-full h-44 bg-slate-50 rounded-2xl p-4 text-sm text-slate-700 placeholder:text-slate-200 input-focus border border-transparent transition-all resize-none no-scrollbar"
            ></textarea>
        </section>

        <div class="pt-2">
            <button class="w-full py-4 brand-gradient text-white rounded-[24px] text-sm font-black shadow-lg shadow-indigo-200 active:scale-[0.98] transition-all">
                提交反馈
            </button>
        </div>

        <section class="bg-[#EBEAF5]/60 rounded-[32px] p-6 border border-white/50">
            <div class="flex items-center gap-2 mb-3 text-indigo-500">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                <h3 class="text-xs font-black uppercase tracking-widest">紧急联系</h3>
            </div>
            <p class="text-[11px] text-slate-500 leading-relaxed mb-4 font-medium">
                如果您有紧急问题或需要更快的回复，请直接发送邮件至 <span class="text-indigo-600 font-bold italic">jasper@bazi-ai.com</span>，我们会优先处理您的问询。
            </p>
            <button class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl text-[10px] font-black text-slate-600 shadow-sm border border-slate-100 active:bg-slate-50">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"/></svg>
                复制邮箱
            </button>
        </section>

    </main>

    <p class="mt-8 text-[9px] text-slate-300 font-bold uppercase tracking-[0.2em]">Powered by Bazi AI Engine</p>

</body>
</html>
