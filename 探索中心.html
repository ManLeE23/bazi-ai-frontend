<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F1F0FA; font-family: -apple-system, sans-serif; }
        .brand-gradient { background: linear-gradient(135deg, #818CF8 0%, #6366F1 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="flex items-center justify-between mb-6 px-2">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-black text-slate-800 tracking-tight">人生趋势</h1>
        </div>
        <!-- <div class="px-3 py-1 bg-white/50 rounded-full border border-white">
            <p class="text-[9px] font-bold text-indigo-400 uppercase tracking-wider">对话额度明日重置</p>
        </div> -->
    </header>

    <section class="bg-white rounded-[32px] p-6 shadow-sm mb-6 relative overflow-hidden">
        <div class="absolute -right-10 -top-10 w-40 h-40 bg-indigo-50 rounded-full opacity-50"></div>
        
        <div class="flex justify-between items-start relative z-10">
            <div>
                <h3 class="text-sm font-black text-slate-800 mb-1">今日趋势</h3>
                <p class="text-[11px] text-slate-400 font-medium">综合能量评分</p>
            </div>
            <div class="text-right">
                <span class="text-3xl font-black text-indigo-600">85</span>
                <span class="text-[10px] text-indigo-300 font-bold block uppercase">Excellent</span>
            </div>
        </div>

        <div class="flex items-end justify-between h-24 mt-6 gap-3">
            <div class="flex-1 bg-slate-50 rounded-t-xl relative h-[60%]"><div class="absolute bottom-0 w-full h-[100%] brand-gradient rounded-t-xl opacity-30"></div></div>
            <div class="flex-1 bg-slate-50 rounded-t-xl relative h-[85%]"><div class="absolute bottom-0 w-full h-[100%] brand-gradient rounded-t-xl"></div></div>
            <div class="flex-1 bg-slate-50 rounded-t-xl relative h-[45%]"><div class="absolute bottom-0 w-full h-[100%] brand-gradient rounded-t-xl opacity-50"></div></div>
            <div class="flex-1 bg-slate-50 rounded-t-xl relative h-[70%]"><div class="absolute bottom-0 w-full h-[100%] brand-gradient rounded-t-xl opacity-80"></div></div>
            <div class="flex-1 bg-slate-50 rounded-t-xl relative h-[30%]"><div class="absolute bottom-0 w-full h-[100%] brand-gradient rounded-t-xl opacity-20"></div></div>
        </div>
        <button class="w-full py-4 bg-white/40 border border-white/60 rounded-[24px] flex items-center justify-center gap-2 group active:scale-[0.98] transition-all">
            <span class="text-[11px] font-black text-indigo-500/80 tracking-wide">查看详细情势分析</span>
            <div class="w-5 h-5 bg-indigo-500 rounded-full flex items-center justify-center text-white scale-75 group-hover:scale-90 transition-transform">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M9 5l7 7-7 7"/></svg>
            </div>
        </button>
    </section>

    <div class="grid grid-cols-2 gap-4">
        <div class="bg-white rounded-[28px] p-5 shadow-sm border border-transparent hover:border-indigo-100 transition-all">
            <div class="w-8 h-8 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-500 mb-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h4 class="text-xs font-black text-slate-700">问运势</h4>
            <p class="text-[9px] text-slate-400 mt-1">洞察近期能量起伏</p>
        </div>

        <div class="bg-white rounded-[28px] p-5 shadow-sm border border-transparent">
            <div class="w-8 h-8 bg-rose-50 rounded-xl flex items-center justify-center text-rose-500 mb-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            </div>
            <h4 class="text-xs font-black text-slate-700">匹配度</h4>
            <p class="text-[9px] text-slate-400 mt-1">人际关系深度合盘</p>
        </div>

        <div class="bg-white rounded-[28px] p-5 shadow-sm">
            <div class="w-8 h-8 bg-blue-50 rounded-xl flex items-center justify-center text-blue-500 mb-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <h4 class="text-xs font-black text-slate-700">问事业</h4>
            <p class="text-[9px] text-slate-400 mt-1">职业规划与财富时机</p>
        </div>

        <div class="bg-white rounded-[28px] p-5 shadow-sm">
            <div class="w-8 h-8 bg-purple-50 rounded-xl flex items-center justify-center text-purple-500 mb-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
            </div>
            <h4 class="text-xs font-black text-slate-700">问情感</h4>
            <p class="text-[9px] text-slate-400 mt-1">寻找缘分交汇点</p>
        </div>
    </div>

    <div class="mt-4 brand-gradient rounded-[28px] p-5 flex items-center justify-between text-white shadow-xl shadow-indigo-100 active:scale-[0.98] transition-all">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-white/20 backdrop-blur rounded-2xl flex items-center justify-center text-2xl">👩‍❤️‍👨</div>
            <div>
                <h3 class="text-xs font-black">2026年恋爱趋势专项</h3>
                <p class="text-[9px] text-indigo-100 font-medium opacity-80 mt-1">找到最佳缘分时机</p>
            </div>
        </div>
        <svg class="w-5 h-5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg>
    </div>
    <div class="mt-4 bg-indigo-900 rounded-[28px] p-5 flex items-center justify-between shadow-xl shadow-indigo-100">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center">
                <span class="text-xl">👩‍❤️‍👨</span>
            </div>
            <div>
                <h4 class="text-xs font-black text-white">恋爱趋势专题</h4>
                <p class="text-[9px] text-indigo-300 mt-0.5">解锁 2026 年度情感走势图</p>
            </div>
        </div>
        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg>
    </div>

</body>
</html>
